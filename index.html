<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frank Valdez Resume</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #5b6472;
      --line: #d8dee8;
      --paper: #ffffff;
      --back: #eef2f7;
      --accent: #2457a6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--back);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(1.5rem, 3vw, 2.1rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      background: var(--paper);
      text-decoration: none;
      font-weight: 700;
      white-space: nowrap;
    }

    a.button.primary {
      border-color: var(--accent);
      color: #ffffff;
      background: var(--accent);
    }

    .viewer {
      border: 1px solid var(--line);
      background: var(--paper);
      padding: 16px;
    }

    .viewer a {
      display: block;
      width: 100%;
      text-decoration: none;
    }

    .viewer img {
      display: block;
      width: min(100%, 900px);
      height: auto;
      margin: 0 auto;
      border: 1px solid var(--line);
      background: #ffffff;
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 20px, 1120px);
        padding-top: 14px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      nav {
        justify-content: flex-start;
        width: 100%;
      }

      a.button {
        flex: 1 1 auto;
        justify-content: center;
      }

      .viewer {
        padding: 8px;
      }
    }
  </style>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RSVR6Y389R"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-RSVR6Y389R');
  </script>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Frank Valdez Resume</h1>
        <p>Current PDF resume with LaTeX source included.</p>
      </div>
      <nav aria-label="Resume files">
        <a class="button primary" href="FrankValdezResumeJune_IconSpaced.pdf" download>Download PDF</a>
        <a class="button" href="FrankValdezResumeJune_IconSpaced.tex">View TeX</a>
      </nav>
    </header>

    <section class="viewer" aria-label="Resume preview">
      <a href="FrankValdezResumeJune_IconSpaced.pdf" aria-label="Open resume PDF">
        <img src="FrankValdezResumeJune_IconSpaced_preview.png" alt="Frank Valdez resume preview">
      </a>
    </section>
  </main>
</body>
</html>
